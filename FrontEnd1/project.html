<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Start Your Project | Zain Marketing</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/project.css">
</head>
<body>

<header>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>
      </nav>
    </header>

  <main class="contact-main">
    <section class="contact-intro">
      <h1>Start Your Project With Us</h1>
      <p>Tell us  your ideas and we’ll help bring your vision to life.</p>
    </section>

    <section class="contact-form-section">
      <form class="project-form">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" required>
        </div>

        <div class="form-group">
          <label>Company Name</label>
          <input type="text">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel">
        </div>

        <div class="form-group">
          <label>Type of Service</label>
          <select>
            <option>Branding</option>
            <option>Social Media Marketing</option>
            <option>Application Marketing</option>
            <option>Content Creation</option>
            <option>Web Development</option>
          </select>
        </div>

        <div class="form-group">
          <label>Estimated Budget</label>
          <select>
            <option>Under $500</option>
            <option>$500 – $1000</option>
            <option>$1000+</option>
          </select>
        </div>

        <div class="form-group">
          <label>Project Description</label>
          <textarea rows="8"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Proposal</button>

      </form>
    </section>
  </main>

  <footer>
   © 2024 Zain Marketing. All rights reserved.
  </footer>

</body>
</html>
