<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Start Your Project | Zain Marketing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Submit project ideas to Zain Marketing and let us help bring your ideas vision to life.">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/project.css">
</head>
<body>

   <header class="site-header">
      <nav class="main-nav">
        <ul class="nav-list">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact Us</a></li>
        </ul>
     </nav>
    </header>

  <main class="contact-main">
    <section class="contact-intro">
      <h1 class="main-title">Start Your Project With Us</h1>
      <p>Tell us  your ideas and we’ll help bring your vision to life.</p>
    </section>

    <section class="contact-form-section">
      <form class="project-form">

        <div class="form-group">
          <label for="full-name">Full Name</label>
          <input class="form-input" type="text" id="full-name" name="full-name" required>
        </div>

        <div class="form-group">
          <label for="company">Company Name</label>
          <input class="form-input" type="text" id="company" name="company">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
          <label for="tel">Phone Number</label>
          <input class="form-input" type="tel" id="tel" name="tel">
        </div>

        <div class="form-group">
          <label for="service">Type of Service</label>
          <select class="form-input" id="service" name="service">
            <option>Branding</option>
            <option>Social Media Marketing</option>
            <option>Application Marketing</option>
            <option>Content Creation</option>
            <option>Web Development</option>
          </select>
        </div>

        <div class="form-group">
          <label for="budget">Estimated Budget</label>
          <select class="form-input" id="budget" name="budget">
            <option>Under $500</option>
            <option>$500 – $1000</option>
            <option>$1000+</option>
          </select>
        </div>

        <div class="form-group">
          <label for="desc">Project Description</label>
          <textarea class="form-input" rows="8" id="desc" name="desc"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Proposal</button>

      </form>
    </section>
  </main>

  <footer>
   © 2024 Zain Marketing. All rights reserved.
  </footer>

</body>
</html>
